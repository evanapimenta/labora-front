<div>
    <div class="absolute inset-0">
        <img src="/assets/images/auth/bg-gradient.png" alt="image" class="h-full w-full object-cover" />
    </div>

    <div
        class="relative flex h-screen items-center justify-center overflow-hidden bg-cover bg-center bg-no-repeat px-6 py-4 dark:bg-[#060818] sm:px-16 sm:py-6"
    >
        <!-- Theme Toggle (top-right) -->
        <div class="absolute top-4 right-4 z-20">
            <app-theme-toggle variant="glass"></app-theme-toggle>
        </div>

        <img src="/assets/images/auth/coming-soon-object1.png" alt="image" class="absolute left-0 top-1/2 h-full max-h-[893px] -translate-y-1/2 opacity-95" />
        <img src="/assets/images/auth/coming-soon-object2.png" alt="image" class="absolute left-24 top-0 h-40 md:left-[30%]" />
        <img src="/assets/images/auth/coming-soon-object2.png" alt="image" class="absolute right-24 bottom-0 h-40 md:right-[30%] rotate-180" />
        <img src="/assets/images/auth/coming-soon-object3.png" alt="image" class="absolute right-0 top-0 h-[300px]" />
        <div
            class="relative w-full max-w-[870px] rounded-2xl p-px"
            style="background: linear-gradient(135deg, rgba(81,50,125,0.25), rgba(234,93,123,0.25));"
        >
            <div class="relative flex flex-col justify-center rounded-2xl bg-white/70 px-6 py-8 backdrop-blur-2xl dark:bg-black/50 shadow-2xl shadow-darkPurple/20 sm:py-10">
                <div class="mx-auto w-full max-w-[440px]">
                    <div class="mb-6">
                        <h1 class="text-2xl font-extrabold uppercase !leading-snug bg-mainGradient bg-clip-text text-transparent md:text-3xl">Cadastro</h1>
                        <p class="text-sm font-bold leading-normal text-white-dark mt-1">Informe seus dados para criar uma conta</p>
                    </div>
                    <form class="space-y-3.5 dark:text-white" [formGroup]="form" (submit)="register()">
                        <div>
                            <label for="Name">Nome</label>
                            <div class="relative text-white-dark">
                                <input formControlName="name" id="Name" type="text" placeholder="Digite seu nome" class="form-input ps-11 placeholder:text-white-dark h-11" />
                                <span class="absolute start-4 top-1/2 -translate-y-1/2 text-gray-400">
                                    <icon-user [fill]="false" />
                                </span>
                            </div>
                        </div>
                        <div>
                            <label for="Email">Email</label>
                            <div class="relative text-white-dark">
                                <input formControlName="email" id="Email" type="email" placeholder="Digite o Email" class="form-input ps-11 placeholder:text-white-dark h-11" />
                                <span class="absolute start-4 top-1/2 -translate-y-1/2 text-gray-400">
                                    <icon-mail [fill]="false" />
                                </span>
                            </div>
                        </div>
                        <div>
                            <label for="Password">Senha</label>
                            <div class="relative text-white-dark">
                                <input formControlName="password" id="Password" type="password" placeholder="Digite a Senha" class="form-input ps-11 placeholder:text-white-dark h-11" />
                                <span class="absolute start-4 top-1/2 -translate-y-1/2 text-gray-400">
                                    <icon-lock-dots [fill]="false" />
                                </span>
                            </div>
                        </div>
                        <div>
                            <label for="ConfirmPassword">Confirmar Senha</label>
                            <div class="relative text-white-dark">
                                <input formControlName="confirmPassword" id="ConfirmPassword" type="password" placeholder="Confirme a Senha" class="form-input ps-11 placeholder:text-white-dark h-11" />
                                <span class="absolute start-4 top-1/2 -translate-y-1/2 text-gray-400">
                                    <icon-lock-dots [fill]="false" />
                                </span>
                            </div>
                        </div>
                        <button type="submit" class="btn bg-mainGradient text-white !mt-5 w-full border-0 uppercase shadow-brand hover:shadow-[0_14px_30px_-10px_rgba(206,81,108,0.55)] tracking-wider h-11">
                            Cadastrar
                        </button>
                    </form>

                    <div class="text-center dark:text-white mt-5 text-sm">
                        Já tem uma conta?
                        <a routerLink="/sign-in" class="cursor-pointer font-bold text-primary hover:text-darkPink transition-colors duration-200">
                            Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
