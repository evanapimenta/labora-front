<div class="animate__animated animate__fadeIn">

  <div *ngIf="loading" class="panel bg-white dark:bg-[#191e3a] p-16 rounded-xl text-center border border-[#e0e6ed] dark:border-[#1b2e4b] max-w-2xl mx-auto shadow-md">
    <div class="w-10 h-10 border-4 border-primary border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
    <p class="text-xs text-gray-500 dark:text-gray-400">Carregando configurações...</p>
  </div>

  <div *ngIf="!loading" class="max-w-2xl mx-auto">
    <div class="panel border border-[#e0e6ed] dark:border-[#1b2e4b] bg-white dark:bg-[#191e3a] rounded-2xl p-8 shadow-md">
      
      <div class="flex items-center gap-3 mb-8 border-b border-gray-100 dark:border-gray-800 pb-4">
        <div class="w-1 h-6 bg-primary rounded-full"></div>
        <h6 class="font-bold text-base text-gray-800 dark:text-white-light">Configurações de Preferências</h6>
      </div>

      <form (submit)="saveSettings(); $event.preventDefault();" class="space-y-8">
        
        <!-- Tema do Sistema -->
        <div>
          <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-4 block">Modo de Exibição (Tema)</label>
          
          <div class="grid grid-cols-3 gap-4">
            <!-- Light Theme Option -->
            <label 
              [ngClass]="{'border-primary bg-primary/5 dark:bg-primary/10': theme === 'light', 'border-gray-200 dark:border-gray-700': theme !== 'light'}"
              class="relative flex flex-col items-center justify-center p-4 rounded-xl border-2 cursor-pointer transition-all hover:border-primary/50 text-center select-none"
            >
              <input type="radio" name="theme" value="light" [(ngModel)]="theme" (ngModelChange)="onThemeChange()" class="sr-only" />
              <div class="w-8 h-8 rounded-full bg-gray-100 text-gray-700 flex items-center justify-center mb-2">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5">
                  <circle cx="12" cy="12" r="5" />
                  <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
                </svg>
              </div>
              <span class="text-xs font-bold text-gray-700 dark:text-gray-300">Modo Claro</span>
            </label>

            <!-- Dark Theme Option -->
            <label 
              [ngClass]="{'border-primary bg-primary/5 dark:bg-primary/10': theme === 'dark', 'border-gray-200 dark:border-gray-700': theme !== 'dark'}"
              class="relative flex flex-col items-center justify-center p-4 rounded-xl border-2 cursor-pointer transition-all hover:border-primary/50 text-center select-none"
            >
              <input type="radio" name="theme" value="dark" [(ngModel)]="theme" (ngModelChange)="onThemeChange()" class="sr-only" />
              <div class="w-8 h-8 rounded-full bg-gray-800 text-gray-200 flex items-center justify-center mb-2">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5">
                  <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                </svg>
              </div>
              <span class="text-xs font-bold text-gray-700 dark:text-gray-300">Modo Escuro</span>
            </label>

            <!-- System Theme Option -->
            <label 
              [ngClass]="{'border-primary bg-primary/5 dark:bg-primary/10': theme === 'system', 'border-gray-200 dark:border-gray-700': theme !== 'system'}"
              class="relative flex flex-col items-center justify-center p-4 rounded-xl border-2 cursor-pointer transition-all hover:border-primary/50 text-center select-none"
            >
              <input type="radio" name="theme" value="system" [(ngModel)]="theme" (ngModelChange)="onThemeChange()" class="sr-only" />
              <div class="w-8 h-8 rounded-full bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 flex items-center justify-center mb-2">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5">
                  <rect x="2" y="3" width="20" height="14" rx="2" ry="2" />
                  <line x1="8" y1="21" x2="16" y2="21" />
                  <line x1="12" y1="17" x2="12" y2="21" />
                </svg>
              </div>
              <span class="text-xs font-bold text-gray-700 dark:text-gray-300">Automático</span>
            </label>
          </div>
        </div>

        <!-- Menu Lateral (Sidebar) -->
        <div>
          <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-4 block">Menu Lateral</label>
          
          <div class="grid grid-cols-2 gap-4">
            <!-- Sidebar Open Option -->
            <label 
              [ngClass]="{'border-primary bg-primary/5 dark:bg-primary/10': !sidebarCollapsed, 'border-gray-200 dark:border-gray-700': sidebarCollapsed}"
              class="relative flex flex-col items-center justify-center p-4 rounded-xl border-2 cursor-pointer transition-all hover:border-primary/50 text-center select-none"
            >
              <input type="radio" name="sidebarCollapsed" [value]="false" [(ngModel)]="sidebarCollapsed" (ngModelChange)="onSidebarChange()" class="sr-only" />
              <div class="w-8 h-8 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 flex items-center justify-center mb-2">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5">
                  <rect x="3" y="3" width="18" height="18" rx="2" />
                  <line x1="9" y1="3" x2="9" y2="21" />
                </svg>
              </div>
              <span class="text-xs font-bold text-gray-700 dark:text-gray-300">Aberto (Expandido)</span>
            </label>

            <!-- Sidebar Closed Option -->
            <label 
              [ngClass]="{'border-primary bg-primary/5 dark:bg-primary/10': sidebarCollapsed, 'border-gray-200 dark:border-gray-700': !sidebarCollapsed}"
              class="relative flex flex-col items-center justify-center p-4 rounded-xl border-2 cursor-pointer transition-all hover:border-primary/50 text-center select-none"
            >
              <input type="radio" name="sidebarCollapsed" [value]="true" [(ngModel)]="sidebarCollapsed" (ngModelChange)="onSidebarChange()" class="sr-only" />
              <div class="w-8 h-8 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 flex items-center justify-center mb-2">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5">
                  <rect x="3" y="3" width="18" height="18" rx="2" />
                  <line x1="6" y1="3" x2="6" y2="21" />
                </svg>
              </div>
              <span class="text-xs font-bold text-gray-700 dark:text-gray-300">Fechado (Colapsado)</span>
            </label>
          </div>
        </div>

        <!-- Botões de Ação -->
        <div class="flex justify-end gap-3 pt-6 border-t border-gray-100 dark:border-gray-800">
          <button type="submit" class="btn btn-primary px-6" [disabled]="saving">
            <span *ngIf="saving" class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin inline-block me-1 align-middle"></span>
            Salvar Configurações
          </button>
        </div>

      </form>
    </div>
  </div>

</div>
