<div class="animate__animated animate__fadeIn">

  <div *ngIf="loading" class="panel bg-white dark:bg-[#191e3a] p-16 rounded-xl text-center border border-[#e0e6ed] dark:border-[#1b2e4b]">
    <div class="w-10 h-10 border-4 border-primary border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
    <p class="text-xs text-gray-500">Carregando dados da conta...</p>
  </div>

  <div *ngIf="errorMsg" class="alert alert-danger mb-6">
    <p class="text-xs font-semibold">{{ errorMsg }}</p>
  </div>

  <div *ngIf="!loading" class="flex flex-col lg:flex-row gap-6">

    <div class="lg:w-64 flex flex-col gap-4">

      <div class="panel border border-[#e0e6ed] dark:border-[#1b2e4b] bg-white dark:bg-[#191e3a] rounded-2xl p-6 flex flex-col items-center text-center gap-3">
        <div class="relative">
          <div class="w-20 h-20 rounded-full overflow-hidden bg-gradient-to-br from-primary to-[#c23b6a] flex items-center justify-center shadow-lg">
            <img *ngIf="getProfileImageUrl() !== '/assets/images/profile.png'"
                 [src]="getProfileImageUrl()" alt="Foto" class="w-full h-full object-cover" />
            <span *ngIf="getProfileImageUrl() === '/assets/images/profile.png'"
                  class="text-3xl font-black text-white">{{ getUserInitials() }}</span>
          </div>
          <div class="absolute bottom-0 right-0 w-4 h-4 bg-success rounded-full border-2 border-white dark:border-[#191e3a]"></div>
        </div>
        <div>
          <h5 class="font-extrabold text-sm text-gray-800 dark:text-white-light">{{ user.firstName || '...' }}</h5>
        </div>
      </div>

      <div class="panel border border-[#e0e6ed] dark:border-[#1b2e4b] bg-white dark:bg-[#191e3a] rounded-2xl p-4">
        <p class="text-[10px] font-bold uppercase tracking-wider text-gray-400 mb-3">Ações</p>
        <button type="button" (click)="onChangePassword()"
                class="w-full text-left flex items-center gap-3 px-3 py-2.5 rounded-lg text-xs font-semibold text-gray-600 dark:text-gray-300 hover:bg-primary/5 hover:text-primary transition-all duration-200">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          Alterar Senha
        </button>
      </div>
    </div>

    <div class="flex-1">
      <div class="panel border border-[#e0e6ed] dark:border-[#1b2e4b] bg-white dark:bg-[#191e3a] rounded-2xl p-8 h-full">
        <div class="flex items-center gap-3 mb-6">
          <div class="w-1 h-6 bg-primary rounded-full"></div>
          <h6 class="font-bold text-base text-gray-800 dark:text-white-light">Dados Pessoais</h6>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">

          <div class="group">
            <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2 block">Nome Completo</label>
            <div class="relative">
              <div class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 group-hover:text-primary transition-colors">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle>
                </svg>
              </div>
              <div class="h-11 pl-10 pr-4 bg-gray-50 dark:bg-[#0e1726] border border-[#e0e6ed] dark:border-[#1b2e4b] group-hover:border-primary/40 rounded-lg flex items-center text-sm font-semibold text-gray-700 dark:text-gray-200 transition-colors">
                {{ user.firstName || '—' }}
              </div>
            </div>
          </div>

          <div class="group">
            <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2 block">Data de Nascimento</label>
            <div class="relative">
              <div class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 group-hover:text-primary transition-colors">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                  <line x1="16" y1="2" x2="16" y2="6"></line>
                  <line x1="8" y1="2" x2="8" y2="6"></line>
                  <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
              </div>
              <div class="h-11 pl-10 pr-4 bg-gray-50 dark:bg-[#0e1726] border border-[#e0e6ed] dark:border-[#1b2e4b] group-hover:border-primary/40 rounded-lg flex items-center text-sm font-semibold text-gray-700 dark:text-gray-200 transition-colors">
                {{ user.dateOfBirth || '—' }}
              </div>
            </div>
          </div>

          <div class="group">
            <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2 block">E-mail</label>
            <div class="relative">
              <div class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 group-hover:text-primary transition-colors">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                  <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
              </div>
              <div class="h-11 pl-10 pr-4 bg-gray-50 dark:bg-[#0e1726] border border-[#e0e6ed] dark:border-[#1b2e4b] group-hover:border-primary/40 rounded-lg flex items-center text-sm font-semibold text-gray-700 dark:text-gray-200 transition-colors">
                {{ user.email || '—' }}
              </div>
            </div>
          </div>

          <div class="group">
            <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-2 block">Telefone</label>
            <div class="relative">
              <div class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 group-hover:text-primary transition-colors">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.62 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.08 6.08l1.07-.97a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"></path>
                </svg>
              </div>
              <div class="h-11 pl-10 pr-4 bg-gray-50 dark:bg-[#0e1726] border border-[#e0e6ed] dark:border-[#1b2e4b] group-hover:border-primary/40 rounded-lg flex items-center text-sm font-semibold text-gray-700 dark:text-gray-200 transition-colors">
                {{ user.phoneNumber || '—' }}
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>

  </div>

</div>
