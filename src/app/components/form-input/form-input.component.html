<div class="flex flex-col w-full">
  <label [for]="id" class="text-gray-700 dark:text-white-dark font-semibold text-xs mb-1.5">{{ label }}</label>
  <input
    [id]="id"
    [type]="type"
    [placeholder]="placeholder"
    [readonly]="readonly"
    [ngModel]="value"
    (ngModelChange)="onValueChange($event)"
    class="form-input text-sm h-10 w-full"
    [ngClass]="readonly ? 'bg-slate-100 dark:bg-slate-800 text-gray-500 cursor-not-allowed opacity-80' : ''"
  />
</div>
