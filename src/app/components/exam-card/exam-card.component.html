<div *ngIf="!isSummaryMode; else summaryTmpl"
     [class]="'group relative panel border p-5 rounded-2xl transition-all duration-300 hover:-translate-y-1 hover:shadow-card-hover flex flex-col justify-between h-full bg-white dark:bg-[#191e3a] overflow-hidden ' +
              (isSelected ? 'border-primary bg-primary/5 shadow-glow' : 'border-[#e0e6ed] dark:border-[#1b2e4b] shadow-soft hover:border-primary/40')">

  <!-- Decorative accent -->
  <div class="absolute top-0 left-0 right-0 h-0.5 bg-gradient-to-r from-primary/0 via-primary to-darkPurple/80 transition-opacity duration-300"
       [ngClass]="isSelected ? 'opacity-100' : 'opacity-0 group-hover:opacity-100'"></div>

  <div>
    <h6 class="font-extrabold text-gray-800 dark:text-white-light text-[15px] uppercase tracking-wide transition-colors duration-300"
        [ngClass]="isSelected ? 'text-primary' : 'group-hover:text-primary'">
      {{ exam?.name }}
    </h6>

    <div class="mt-2.5 flex flex-wrap gap-2 items-center">
      <span *ngIf="exam?.estimatedResultTime"
            class="chip bg-success/10 text-success">
        <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
        Prazo: {{ exam?.estimatedResultTime }}
      </span>
    </div>

    <div class="h-px w-full bg-gradient-to-r from-gray-100 via-gray-200 to-gray-100 dark:from-transparent dark:via-[#1b2e4b] dark:to-transparent my-3.5"></div>

    <p class="text-gray-500 dark:text-gray-400 text-xs leading-relaxed line-clamp-3 mb-5">{{ exam?.description }}</p>
  </div>

  <div *ngIf="showActions" class="flex justify-between items-center mt-auto gap-2">
    <button
      type="button"
      (click)="onViewDetails($event)"
      class="text-[11px] font-bold border border-[#e0e6ed] dark:border-[#253b5c] px-3 py-1.5 rounded-lg hover:bg-gray-50 hover:border-gray-300 dark:hover:bg-[#121e32] text-gray-600 dark:text-gray-400 transition-all duration-200">
      Detalhes
    </button>

    <button
      type="button"
      (click)="onSelect()"
      class="text-[11px] font-bold px-3.5 py-1.5 rounded-lg transition-all duration-300 inline-flex items-center gap-1"
      [ngClass]="isSelected ? 'bg-primary text-white shadow-brand' : 'bg-primary/10 text-primary hover:bg-primary hover:text-white hover:shadow-brand'">
      Agendar
      <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="5" y1="12" x2="19" y2="12"></line>
        <polyline points="12 5 19 12 12 19"></polyline>
      </svg>
    </button>
  </div>
</div>

<ng-template #summaryTmpl>
  <div class="panel border border-[#e0e6ed] dark:border-[#1b2e4b] bg-white dark:bg-[#0e1726] p-4.5 rounded-2xl flex justify-between items-center min-h-[5.5rem] py-3 w-full animate__animated animate__fadeIn shadow-soft">
    <div class="flex items-center gap-3 min-w-0">
      <div class="w-10 h-10 rounded-xl bg-primary/10 text-primary flex items-center justify-center shrink-0">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
        </svg>
      </div>
      <div class="min-w-0">
        <h6 class="font-extrabold text-gray-800 dark:text-white-light text-[15px] uppercase tracking-wide truncate">
          {{ exam?.name }}
        </h6>
        <div class="mt-1 flex flex-wrap gap-2 items-center">
          <span *ngIf="exam?.estimatedResultTime"
                class="chip bg-success/10 text-success">
            Prazo: {{ exam?.estimatedResultTime }}
          </span>
        </div>
      </div>
    </div>
    <div class="flex flex-col gap-1.5 shrink-0">
      <button type="button" (click)="onViewDetails($event)" class="text-[11px] font-bold border border-[#e0e6ed] dark:border-[#253b5c] px-3 py-1 rounded-lg hover:bg-gray-50 hover:border-gray-300 dark:hover:bg-[#121e32] text-gray-600 dark:text-gray-400 transition-all duration-200">
        Detalhes
      </button>
      <button type="button" (click)="onChange()" class="text-[10px] font-bold border border-[#e0e6ed] dark:border-[#253b5c] px-2 py-0.5 rounded-lg hover:bg-primary/5 hover:border-primary/30 hover:text-primary text-gray-500 dark:text-gray-400 transition-all duration-200">
        Alterar
      </button>
    </div>
  </div>
</ng-template>
