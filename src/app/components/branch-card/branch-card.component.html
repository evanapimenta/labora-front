<div *ngIf="!isSummaryMode; else summaryTmpl"
     (click)="onSelect()"
     class="group relative panel border border-[#e0e6ed] dark:border-[#1b2e4b] bg-white dark:bg-[#0e1726] p-5 cursor-pointer rounded-2xl shadow-soft hover:shadow-card-hover hover:-translate-y-1 hover:border-primary/40 transition-all duration-300 flex flex-col justify-between h-full overflow-hidden">

  <!-- Decorative accent -->
  <div class="absolute top-0 left-0 right-0 h-0.5 bg-gradient-to-r from-primary/0 via-primary to-darkPurple/80 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>

  <div>
    <div class="flex justify-between items-start mb-3">
      <div class="min-w-0 pr-2">
        <h6 class="font-extrabold text-gray-800 dark:text-white-light text-sm uppercase tracking-wide group-hover:text-primary transition-colors duration-300 truncate">
          {{ branch?.name }}
        </h6>
        <div class="text-[11px] text-gray-500 mt-0.5 font-semibold">{{ branch?.city }}</div>
      </div>
      <div class="chip bg-primary/8 text-primary shrink-0">
        <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
          <circle cx="12" cy="10" r="3"></circle>
        </svg>
        {{ branch?.distance }}
      </div>
    </div>

    <div class="h-px w-full bg-gradient-to-r from-gray-100 via-gray-200 to-gray-100 dark:from-transparent dark:via-[#1b2e4b] dark:to-transparent my-3"></div>

    <div class="text-xs text-gray-500 leading-relaxed mb-4">
      <span class="text-[10px] font-bold uppercase tracking-wider text-gray-400 dark:text-gray-500 block mb-1">Endereço</span>
      <span class="text-gray-600 dark:text-gray-300">{{ branch?.street }}, {{ branch?.number }} - {{ branch?.neighborhood }}</span>
    </div>
  </div>

  <div class="flex justify-between items-center mt-auto border-t border-gray-100 dark:border-[#1b2e4b] pt-3">
    <div class="text-[11px] text-gray-400">
      Próx. data: <span class="font-bold text-gray-700 dark:text-gray-300">{{ branch?.available }}</span>
    </div>
    <button type="button" class="rounded-full w-8 h-8 p-0 flex items-center justify-center bg-primary/10 text-primary group-hover:bg-primary group-hover:text-white transition-all duration-300 shadow-sm group-hover:shadow-brand">
      <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="5" y1="12" x2="19" y2="12"></line>
        <polyline points="12 5 19 12 12 19"></polyline>
      </svg>
    </button>
  </div>
</div>

<ng-template #summaryTmpl>
  <div class="panel border border-[#e0e6ed] dark:border-[#1b2e4b] bg-white dark:bg-[#0e1726] p-4.5 rounded-2xl flex justify-between items-center h-22 w-full animate__animated animate__fadeIn shadow-soft">
    <div class="flex items-center gap-3 min-w-0">
      <div class="w-10 h-10 rounded-xl bg-primary/10 text-primary flex items-center justify-center shrink-0">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
          <circle cx="12" cy="10" r="3"></circle>
        </svg>
      </div>
      <div class="min-w-0">
        <h6 class="font-extrabold text-gray-800 dark:text-white-light text-[15px] uppercase tracking-wide truncate">
          {{ branch?.name }}
        </h6>
        <div class="text-[12px] text-gray-500 font-semibold mt-0.5">
          {{ branch?.city }}
        </div>
      </div>
    </div>
    <div>
      <button type="button" (click)="onChange()" class="text-[10px] font-bold border border-[#e0e6ed] dark:border-[#253b5c] px-3 py-1 rounded-lg hover:bg-primary/5 hover:border-primary/30 hover:text-primary text-gray-500 dark:text-gray-400 transition-all duration-200">
        Alterar
      </button>
    </div>
  </div>
</ng-template>
