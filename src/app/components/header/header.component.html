<header class="sticky top-0 z-30 bg-white/80 dark:bg-[#0e1726]/80 backdrop-blur-xl border-b border-gray-100/80 dark:border-white/[0.06]">
    <div class="flex items-center justify-between px-6 py-3">
        <div class="flex items-center gap-3">
            <button
                *ngIf="sidebarCollapsed"
                class="flex h-10 w-10 items-center justify-center rounded-xl text-gray-500 transition-all duration-200 hover:bg-primary/10 hover:text-primary dark:text-white-light dark:hover:bg-white/[0.06]"
                (click)="onSidebarToggle()"
                title="Abrir menu lateral">
                <icon-menu></icon-menu>
            </button>

            <a *ngIf="sidebarCollapsed" routerLink="/" class="h-9 flex items-center shrink-0">
                <img [src]="logo" alt="Labify" class="h-8 w-auto" />
            </a>
        </div>

        <!-- No header, preciso que comente o input que está lá para pesquisar, pois não vou utilizar por enquanto (ele nem funciona)
        <div class="flex-1 max-w-md mx-8">
            <app-search-input
                placeholder="Pesquisar..."
                (searchChange)="onSearchChange($event)"
                (search)="onSearch($event)">
            </app-search-input>
        </div>
        -->

        <div class="flex items-center gap-2">
            <!-- Dark Mode Toggle Button -->
            <div class="flex items-center" *ngIf="store">
                <a
                    href="javascript:;"
                    *ngIf="store.theme === 'light'"
                    class="flex h-10 w-10 items-center justify-center rounded-xl text-gray-500 transition-all duration-200 hover:bg-primary/10 hover:text-primary dark:text-gray-300 dark:hover:bg-white/[0.06]"
                    (click)="storeData.dispatch({type: 'toggleTheme', payload:'dark'})"
                    title="Mudar para Modo Escuro">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5">
                        <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="1.5" />
                        <path d="M12 2V4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                        <path d="M12 20V22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                        <path d="M4 12L2 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                        <path d="M22 12L20 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                        <path opacity="0.5" d="M19.7778 4.22266L17.5558 6.25424" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                        <path opacity="0.5" d="M4.22217 4.22266L6.44418 6.25424" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                        <path opacity="0.5" d="M6.44434 17.5557L4.22211 19.7779" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                        <path opacity="0.5" d="M19.7778 19.7773L17.5558 17.5551" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                    </svg>
                </a>
                <a
                    href="javascript:;"
                    *ngIf="store.theme === 'dark'"
                    class="flex h-10 w-10 items-center justify-center rounded-xl text-gray-500 transition-all duration-200 hover:bg-primary/10 hover:text-primary dark:text-gray-300 dark:hover:bg-white/[0.06]"
                    (click)="storeData.dispatch({type: 'toggleTheme', payload:'system'})"
                    title="Mudar para Modo Automático (Sistema)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5">
                        <path
                            d="M21.0672 11.8568L20.4253 11.469L21.0672 11.8568ZM12.1432 2.93276L11.7553 2.29085V2.29085L12.1432 2.93276ZM21.25 12C21.25 17.1086 17.1086 21.25 12 21.25V22.75C17.9371 22.75 22.75 17.9371 22.75 12H21.25ZM12 21.25C6.89137 21.25 2.75 17.1086 2.75 12H1.25C1.25 17.9371 6.06294 22.75 12 22.75V21.25ZM2.75 12C2.75 6.89137 6.89137 2.75 12 2.75V1.25C6.06294 1.25 1.25 6.06294 1.25 12H2.75ZM15.5 14.25C12.3244 14.25 9.75 11.6756 9.75 8.5H8.25C8.25 12.5041 11.4959 15.75 15.5 15.75V14.25ZM20.4253 11.469C19.4172 13.1373 17.5882 14.25 15.5 14.25V15.75C18.1349 15.75 20.4407 14.3439 21.7092 12.2447L20.4253 11.469ZM9.75 8.5C9.75 6.41182 10.8627 4.5828 12.531 3.57467L11.7553 2.29085C9.65609 3.5593 8.25 5.86509 8.25 8.5H9.75ZM12 2.75C11.9115 2.75 11.8077 2.71008 11.7324 2.63168C11.6686 2.56527 11.6538 2.50244 11.6503 2.47703C11.6461 2.44587 11.6482 2.35557 11.6503 2.47703C11.6461 2.44587 11.6482 2.35557 11.6503 2.47703C11.6461 2.44587 11.6482 2.35557 11.6503 2.47703C11.6461 2.44587 11.6482 2.35557 11.6503 2.47703C11.6461 2.44587 11.6482 2.35557 11.6503 2.47703C11.6461 2.44587 11.6482 2.35557 11.6503 2.47703L12.531 3.57467ZM21.7092 12.2447C21.6444 12.3518 21.5541 12.3539 21.523 12.3497C21.4976 12.3462 21.4347 12.3314 21.3683 12.2676C21.2899 12.1923 21.25 12.0885 21.25 12H22.75C22.75 11.2834 22.1787 10.9246 21.7237 10.8632C21.286 10.804 20.7293 10.9658 20.4253 11.469L21.7092 12.2447Z"
                            fill="currentColor"
                        />
                    </svg>
                </a>
                <a
                    href="javascript:;"
                    *ngIf="store.theme === 'system'"
                    class="flex h-10 w-10 items-center justify-center rounded-xl text-gray-500 transition-all duration-200 hover:bg-primary/10 hover:text-primary dark:text-gray-300 dark:hover:bg-white/[0.06]"
                    (click)="storeData.dispatch({type: 'toggleTheme', payload:'light'})"
                    title="Mudar para Modo Claro">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5">
                        <path
                            d="M3 9C3 6.17157 3 4.75736 3.87868 3.87868C4.75736 3 6.17157 3 9 3H15C17.8284 3 19.2426 3 20.1213 3.87868C21 4.75736 21 6.17157 21 9V14C21 15.8856 21 16.8284 20.4142 17.4142C19.8284 18 18.8856 18 17 18H7C5.11438 18 4.17157 18 3.58579 17.4142C3 16.8284 3 15.8856 3 14V9Z"
                            stroke="currentColor"
                            stroke-width="1.5"
                        />
                        <path opacity="0.5" d="M22 21H2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                        <path opacity="0.5" d="M15 15H9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                    </svg>
                </a>
            </div>

            <div class="h-7 w-px bg-gray-200 dark:bg-white/[0.08] mx-1"></div>

            <div class="relative" #userDropdown data-user-dropdown>
                <button
                    class="flex items-center gap-2.5 p-1 pr-2.5 rounded-full hover:bg-gray-100/70 dark:hover:bg-white/[0.06] transition-colors duration-200"
                    (click)="toggleUserDropdown()">
                    <div class="relative">
                        <div class="w-9 h-9 rounded-full overflow-hidden bg-gradient-to-br from-primary to-darkPurple flex items-center justify-center shadow-brand ring-2 ring-white dark:ring-[#1b2e4b]">
                            <img *ngIf="userProfile.avatar !== '/assets/images/profile.png'"
                                 [src]="userProfile.avatar"
                                 [alt]="userProfile.name"
                                 class="w-full h-full object-cover" />
                            <span *ngIf="userProfile.avatar === '/assets/images/profile.png'"
                                  class="text-sm font-black text-white select-none">{{ getUserInitials() }}</span>
                        </div>
                        <div class="absolute -bottom-0.5 -right-0.5 w-3 h-3 bg-success rounded-full ring-2 ring-white dark:ring-[#0e1726]"></div>
                    </div>
                    <div class="hidden md:flex flex-col items-start leading-tight">
                        <span class="text-xs font-bold text-gray-800 dark:text-white-light truncate max-w-[120px]">{{ userProfile.name === 'Carregando...' ? '...' : userProfile.name.split(' ')[0] }}</span>
                        <span class="text-[10px] text-gray-400 truncate max-w-[120px]">{{ userProfile.role }}</span>
                    </div>
                    <svg class="hidden md:block w-3.5 h-3.5 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </button>

                <div
                    *ngIf="isUserDropdownOpen"
                    class="absolute right-0 mt-2 w-60 bg-white dark:bg-[#1b2e4b] rounded-2xl shadow-xl shadow-gray-200/60 dark:shadow-black/40 border border-gray-100 dark:border-white/[0.06] py-1.5 z-50 animate-fade-in-up overflow-hidden">
                    <div class="px-4 py-3 border-b border-gray-100 dark:border-white/[0.06] bg-softGradient dark:bg-transparent">
                        <p class="text-sm font-bold text-gray-800 dark:text-white truncate">{{ userProfile.name }}</p>
                        <p class="text-[11px] text-gray-500 dark:text-gray-400 truncate">{{ userProfile.email }}</p>
                    </div>

                    <div class="p-1.5">
                        <a
                            routerLink="/profile"
                            (click)="isUserDropdownOpen = false"
                            class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-gray-700 dark:text-gray-300 hover:bg-primary/5 hover:text-primary transition-colors duration-150">
                            <icon-user class="w-4 h-4"></icon-user>
                            Meu Perfil
                        </a>

                        <a
                            routerLink="/settings"
                            (click)="isUserDropdownOpen = false"
                            class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-gray-700 dark:text-gray-300 hover:bg-primary/5 hover:text-primary transition-colors duration-150">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            </svg>
                            Configurações
                        </a>
                    </div>

                    <div class="border-t border-gray-100 dark:border-white/[0.06] p-1.5">
                        <button
                            (click)="logout()"
                            class="flex items-center gap-3 w-full px-3 py-2 rounded-lg text-sm text-danger hover:bg-danger/5 transition-colors duration-150">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                            </svg>
                            Sair
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>
